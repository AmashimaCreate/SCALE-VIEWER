            {/* showMode: 音名/度数トグル */}
            <button className="sv-tappable sv-flash-border" onClick={() => onUpdate({ showMode: showMode === "音名" ? "度数" : "音名" })} style={{
              border:`1.5px solid ${TH.border}`, cursor:"pointer", fontFamily:"inherit", outline:"none",
              fontWeight:600, fontSize:"13px", borderRadius:"6px", padding:"8px 14px",
              transition:"all 0.12s", minHeight:"38px",
              background: TH.btnBg, color: TH.btnFg,
            }}>{showMode}</button>
            <div style={{ display:"flex", gap:"4px", flex:"1 1 auto" }}>
              {/* 全体/R35/R37/ルート: 1ボタンで循環 */}
              {(() => {
                const isDisplayCycle = DISPLAY_CYCLE.includes(viewMode);
                const currentLabel = isDisplayCycle ? viewMode : "全体";
                const cycleDisplay = () => {
                  if (!isDisplayCycle) { changeView("全体"); return; }
                  const idx = DISPLAY_CYCLE.indexOf(viewMode);
                  const next = DISPLAY_CYCLE[(idx + 1) % DISPLAY_CYCLE.length];
                  changeView(next);
                };
                return (
                  <button className="sv-tappable sv-flash-border" onClick={cycleDisplay} style={{
                    border:`1.5px solid ${isDisplayCycle && viewMode !== "全体" ? TH.gold : TH.border}`,
                    cursor:"pointer", fontFamily:"inherit", outline:"none",
                    fontWeight:600, fontSize:"13px", borderRadius:"6px", padding:"8px 14px",
                    transition:"all 0.12s", minHeight:"38px",
                    background: isDisplayCycle ? TH.btnActiveBg : TH.btnBg,
                    color: isDisplayCycle ? TH.btnActiveFg : TH.btnFg,
                  }}>{currentLabel}</button>
                );
              })()}
              {/* 3NPS / BOX / CAGED: 個別ボタン */}
              {["3NPS","BOX","CAGED"].map(m => {
                if (m === "3NPS" && pPositions3NPS.length === 0) return null;
                if (m === "BOX" && pPositionsBOX.length === 0) return null;
                if (m === "CAGED" && pPositionsCAGED.length === 0) return null;
                return (
                <button key={m} onClick={() => changeView(m)} style={{
                  border:"none", cursor:"pointer", fontFamily:"inherit", outline:"none",
                  fontWeight:600, fontSize:"13px", borderRadius:"6px", padding:"8px 14px",
                  transition:"all 0.12s", minHeight:"38px",
                  background: viewMode===m ? TH.btnActiveBg : TH.btnBg,
                  color: viewMode===m ? TH.btnActiveFg : TH.btnFg,
                }}>{m}</button>
                );
              })}
            </div>
          </div>
          {/* 下段: ポジション操作（3NPS/BOX/CAGED時のみ） */}
          {hasPositions && (
            <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"6px" }}>
              <button onClick={() => onUpdate({ selectedPos: (safePos-1+total)%total })} style={{
                border:"none", cursor:"pointer", fontFamily:"inherit", outline:"none",
                background:TH.btnBg, color:TH.gold, fontSize:"16px", fontWeight:700,
                borderRadius:"6px", width:"40px", height:"40px",
                display:"inline-flex", alignItems:"center", justifyContent:"center",
              }}>◀</button>
              <span style={{ fontSize:"16px", fontWeight:700, color:TH.gold, minWidth:"72px", textAlign:"center", whiteSpace:"nowrap" }}>
                {pPosLabel}{viewMode !== "CAGED" ? ` / ${total}` : ""}
              </span>
              <button onClick={() => onUpdate({ selectedPos: (safePos+1)%total })} style={{
                border:"none", cursor:"pointer", fontFamily:"inherit", outline:"none",
                background:TH.btnBg, color:TH.gold, fontSize:"16px", fontWeight:700,
                borderRadius:"6px", width:"40px", height:"40px",
                display:"inline-flex", alignItems:"center", justifyContent:"center",
              }}>▶</button>
              {/* つながり表示トグル */}
              <button className="sv-tappable" onClick={() => onUpdate({ showNeighbor: !showNeighbor })} style={{
                border:`1px solid ${showNeighbor ? TH.gold : TH.border}`, cursor:"pointer", fontFamily:"inherit", outline:"none",
                fontWeight:600, fontSize:"12px", borderRadius:"6px", padding:"8px 12px",
                transition:"all 0.12s", minHeight:"38px",
                background: showNeighbor ? `${TH.gold}22` : TH.btnBg,
                color: showNeighbor ? TH.gold : TH.dim,
              }}>前後</button>
            </div>
          )}
          {viewMode !== "全体" && viewMode !== "R35" && viewMode !== "R37" && viewMode !== "ルート" && total === 0 ? (
            <div style={{ padding:"20px", textAlign:"center", color:TH.dim, fontSize:"13px" }}>
              このスケールでは {viewMode} は未対応です
            </div>
          ) : (
            <Fretboard rootPc={pRoot} scaleKey={pScale} showMode={showMode} viewMode={viewMode}
              activeFrets={pActiveFrets} positionRange={pRange} useFlat={noteFlat} compact={true}
              neighborFrets={neighborFrets} rootSpelling={pRootSpelling} />
          )}
        </Card>
      </div>
      </div>
    </div>
  );
}

// ── Main ──
function GuitarScaleViewer() {
  const saved = useMemo(() => loadState(), []);
  const initScales = useMemo(() => {
    const raw = saved?.scales;
    const defaultScale = [
      { root: 0, scaleName: "Major", viewMode: "全体", showMode: "音名", selectedPos: 0, useFlat: false, id: 1, accentColor: ACCENT_COLORS[0] }
    ];
    const src = (raw && raw.length > 0) ? raw : defaultScale;
    // normalizeScaleEntry で rootSpelling / useFlat を正規化
    return src.map((s, i) => ({
      viewMode: "全体",
      showMode: "音名",
      selectedPos: 0,
      ...normalizeScaleEntry(s),
      accentColor: s.accentColor || ACCENT_COLORS[i % ACCENT_COLORS.length],
    }));
  }, []);
  const [scales, setScales] = useState(initScales);
  const [addModalOpen, setAddModalOpen] = useState(false);
  const [confirmClearAll, setConfirmClearAll] = useState(false);
  const [testErrors] = useState(() => runSelfTests());
  // モーダルのルート選択を記憶（閉じても保持）
  // modalSpelling が主役。modalFlat は従属値
  const [modalRoot, setModalRoot] = useState(0);
  const [modalSpelling, setModalSpelling] = useState("C");
  const handleModalRootChange = (newRoot) => {
    setModalRoot(newRoot);
    setModalSpelling(inferRootSpelling(newRoot, isSpellingFlat(modalSpelling)));
  };
  const handleModalFlatToggle = (flat) => {
    setModalSpelling(inferRootSpelling(modalRoot, flat));
  };
  // プリセット機能
  const [presets, setPresets] = useState(() => loadPresets());
  const [presetOpen, setPresetOpen] = useState(false);
  const [presetName, setPresetName] = useState("");
  const [confirmLoadPreset, setConfirmLoadPreset] = useState(null); // 呼び出し確認用

  const saveCurrentAsPreset = (name) => {
    if (!name.trim()) return;
    // rootSpellingを必ず保存（プリセット復元時に理論綴りを維持するため）
    const preset = {
      id: Date.now() + Math.random().toString(36).slice(2,6),
      name: name.trim(),
      scales: scales.map(s => ({
        root: s.root,
        scaleName: s.scaleName,
        useFlat: s.useFlat,
        rootSpelling: s.rootSpelling || inferRootSpelling(s.root, s.useFlat),
      })),
    };
    const updated = [...presets, preset];
    setPresets(updated);
    savePresets(updated);
    setPresetName("");
  };

  const loadPreset = (preset) => {
    colorCounterRef.current = 0;
    // normalizeScaleEntry で rootSpelling / useFlat を正規化して復元
    const loaded = preset.scales.map((s, i) => {
      const color = ACCENT_COLORS[i % ACCENT_COLORS.length];
      return {
        ...normalizeScaleEntry(s),
        viewMode:"全体", showMode:"音名", selectedPos:0,
        id: Date.now() + i + Math.random().toString(36).slice(2,6),
        accentColor: color,
      };
    });
    colorCounterRef.current = loaded.length;
    setScales(loaded);
    setPresetOpen(false);
  };

  const deletePreset = (id) => {
    const updated = presets.filter(p => p.id !== id);
    setPresets(updated);
    savePresets(updated);
  };

  useEffect(() => { saveState({ scales }); }, [scales]);

  const colorCounterRef = useRef(scales.length);
  const addScale = ({ root, scaleName, rootSpelling: spelling }) => {
    const color = ACCENT_COLORS[colorCounterRef.current % ACCENT_COLORS.length];
    colorCounterRef.current++;
    // rootSpellingが渡されるので、それを正としてnormalize
    const entry = normalizeScaleEntry({ root, scaleName, rootSpelling: spelling });
    setScales(prev => [...prev, {
      ...entry,
      viewMode:"全体", showMode:"音名", selectedPos:0,
      id: Date.now() + Math.random().toString(36).slice(2,6),
      accentColor: color,
    }]);
  };
  const removeScale = (id) => { setScales(prev => prev.filter(p => p.id !== id)); };
  const updateScale = (id, patch) => { setScales(prev => prev.map(s => s.id === id ? { ...s, ...patch } : s)); };
  const moveScale = (idx, dir) => {
    setScales(prev => {
      const next = [...prev];
      const t = idx + dir;
      if (t < 0 || t >= next.length) return prev;
      [next[idx], next[t]] = [next[t], next[idx]];
      // 移動先のカードにスクロール追従
      const movedId = next[t].id;
      setTimeout(() => {
        const el = document.getElementById(`scale-card-${movedId}`);
        if (el) el.scrollIntoView({ behavior:"smooth", block:"nearest" });
      }, 50);
      return next;
    });
  };
  const clearScales = () => { setScales([]); };

  return (
    <div style={{ fontFamily:"'Segoe UI','Helvetica Neue',Arial,sans-serif", background:TH.bg, color:TH.text, minHeight:"100vh", padding:"12px", boxSizing:"border-box", overflowX:"hidden" }}>
      <div style={{ textAlign:"center", marginBottom:"12px" }}>
        <h1 style={{ fontSize:"24px", fontWeight:700, margin:0, color:TH.gold, fontFamily:"'Cinzel',serif", letterSpacing:"3px", textTransform:"uppercase" }}>Scale Viewer</h1>
      </div>

      {testErrors.length > 0 && <Card style={{borderColor:"#c44",background:"#2a1515"}}><div style={{color:"#f88",fontSize:"12px",fontWeight:600}}>⚠ セルフテスト失敗:</div>{testErrors.map((e,i) => <div key={i} style={{color:"#faa",fontSize:"11px",marginTop:2}}>{e}</div>)}</Card>}

      <Card style={{padding:"6px 10px", marginBottom:"10px"}}>
        <Metronome />
      </Card>

      {scales.length === 0 && (
        <div style={{ textAlign:"center", padding:"40px 20px", color:TH.dim, fontSize:"14px" }}>
          スケールを追加して練習を始めましょう
        </div>
      )}
      {scales.map((pin, idx) => (
        <ScaleCardRow key={pin.id} pin={pin} index={idx} scaleCount={scales.length} accentColor={pin.accentColor || ACCENT_COLORS[idx % ACCENT_COLORS.length]} onRemove={() => removeScale(pin.id)} onUpdate={(patch) => updateScale(pin.id, patch)} onMoveUp={() => moveScale(idx, -1)} onMoveDown={() => moveScale(idx, 1)} />
      ))}

      <div style={{ marginTop:"6px", display:"flex", flexDirection:"column", gap:"8px" }}>
        <button onClick={() => setAddModalOpen(true)} style={{
          width:"100%", border:`1.5px dashed ${TH.goldDim}`, cursor:"pointer",
          fontFamily:"inherit", outline:"none",
          fontSize:"14px", fontWeight:600, borderRadius:"10px", padding:"12px 0",
          background:"transparent", color:TH.goldDim, transition:"all 0.15s",
        }}>＋ スケールを追加</button>

        <div style={{ display:"flex", gap:"6px" }}>
          {scales.length > 0 && (
            <button onClick={() => setConfirmClearAll(true)} style={{
              flex:"1 1 0", border:"none", cursor:"pointer",
              fontFamily:"inherit", outline:"none",
              fontSize:"12px", fontWeight:500, borderRadius:"8px", padding:"7px 0",
              background:TH.surface, color:TH.dim, transition:"all 0.15s",
            }}>すべてクリア</button>
          )}
          <button onClick={() => setPresetOpen(!presetOpen)} style={{
            flex:"1 1 0", border:"none", cursor:"pointer",
            fontFamily:"inherit", outline:"none",
            fontSize:"12px", fontWeight:600, borderRadius:"8px", padding:"7px 0",
            background: presetOpen ? TH.btnActiveBg : TH.surface,
            color: presetOpen ? TH.btnActiveFg : TH.gold, transition:"all 0.15s",
          }}>★ 今の配置を保存する</button>
        </div>

        {/* お気に入りセットパネル */}
        {presetOpen && (
          <div style={{ border:`1px solid ${TH.border}`, borderRadius:"10px", padding:"10px", background:TH.surface }}>
            {/* 現在の構成を保存 */}
            {scales.length > 0 && (
              <div>
                <div style={{ fontSize:"11px", color:TH.dim, marginBottom:"4px" }}>今のスケール構成を名前をつけて保存できます</div>
                <div style={{ display:"flex", gap:"6px", marginBottom:"8px" }}>
                  <input
                    type="text" placeholder="例: ブルース練習セット" value={presetName}
                    onChange={(e) => setPresetName(e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") saveCurrentAsPreset(presetName); }}
                    style={{
                      flex:"1 1 0", fontSize:"13px", padding:"7px 10px", borderRadius:"6px",
                      border:`1px solid ${TH.border}`, background:TH.card, color:TH.text,
                      fontFamily:"inherit", outline:"none",
                    }}
                  />
                  <button onClick={() => saveCurrentAsPreset(presetName)} style={{
                    border:"none", cursor:"pointer", fontFamily:"inherit", outline:"none",
                    fontSize:"12px", fontWeight:700, borderRadius:"6px", padding:"7px 12px",
                    background:TH.gold, color:TH.btnActiveFg, transition:"all 0.12s",
                    opacity: presetName.trim() ? 1 : 0.4,
                  }}>保存</button>
                </div>
              </div>
            )}
            {/* 保存済み一覧 */}
            {presets.length === 0 ? (
              <div style={{ fontSize:"12px", color:TH.dim, textAlign:"center", padding:"8px 0" }}>
                保存したセットはまだありません
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                {presets.map(p => (
                  <div key={p.id} style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                    <button onClick={() => setConfirmLoadPreset(p)} style={{
                      flex:"1 1 0", border:"none", cursor:"pointer", fontFamily:"inherit", outline:"none",
                      fontSize:"13px", fontWeight:600, borderRadius:"6px", padding:"8px 10px",
                      background:TH.btnBg, color:TH.text, transition:"all 0.12s", textAlign:"left",
                    }}>
                      <span style={{ color:TH.gold }}>★</span> {p.name}
                      <span style={{ fontSize:"11px", color:TH.dim, marginLeft:"6px" }}>
                        ({p.scales.map(s => (s.rootSpelling || inferRootSpelling(s.root, s.useFlat)) + " " + s.scaleName).join(", ")})
                      </span>
                    </button>
                    <button onClick={() => deletePreset(p.id)} style={{
                      border:"none", cursor:"pointer", background:"none",
                      color:TH.dim, fontSize:"16px", fontWeight:700, padding:"2px 6px",
                      transition:"all 0.12s",
                    }}>×</button>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>

      {/* お気に入りセット呼び出し確認ポップアップ */}
      {confirmLoadPreset && (
        <div onClick={() => setConfirmLoadPreset(null)} style={{
          position:"fixed", inset:0, zIndex:200,
          background:TH.overlay, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px",
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background:TH.popupBg, border:`1px solid ${TH.popupBorder}`,
            borderRadius:"14px", padding:"24px", boxShadow:"0 12px 48px rgba(0,0,0,0.7)",
            width:"100%", maxWidth:"340px", textAlign:"center",
          }}>
            <div style={{ fontSize:"15px", fontWeight:700, color:TH.gold, marginBottom:"8px" }}>
              ★ {confirmLoadPreset.name}
            </div>
            <div style={{ fontSize:"13px", color:TH.dim, marginBottom:"6px" }}>
              以下のスケールに切り替えます
            </div>
            <div style={{ fontSize:"13px", color:TH.text, marginBottom:"16px", lineHeight:1.6 }}>
              {confirmLoadPreset.scales.map((s, i) => (
                <div key={i}>{s.rootSpelling || inferRootSpelling(s.root, s.useFlat)} {s.scaleName}</div>
              ))}
            </div>
            <div style={{ fontSize:"12px", color:TH.dim, marginBottom:"16px" }}>
              ※ 現在のスケール表示は置き換わります
            </div>
            <div style={{ display:"flex", gap:"8px" }}>
              <button onClick={() => setConfirmLoadPreset(null)} style={{
                flex:"1 1 0", border:`1px solid ${TH.border}`, cursor:"pointer",
                fontFamily:"inherit", outline:"none", fontWeight:600, fontSize:"14px",
                borderRadius:"8px", padding:"10px 0",
                background:"transparent", color:TH.dim, transition:"all 0.12s",
              }}>キャンセル</button>
              <button onClick={() => { loadPreset(confirmLoadPreset); setConfirmLoadPreset(null); }} style={{
                flex:"1 1 0", border:"none", cursor:"pointer",
                fontFamily:"inherit", outline:"none", fontWeight:700, fontSize:"14px",
                borderRadius:"8px", padding:"10px 0",
                background:TH.gold, color:TH.btnActiveFg, transition:"all 0.12s",
              }}>呼び出す</button>
            </div>
          </div>
        </div>
      )}

      <div style={{textAlign:"center",padding:"10px 0 6px",fontSize:"10px",color:TH.dim,opacity:0.4}}>スケールビューア v1.4</div>

      <AddScaleModal open={addModalOpen} onClose={() => setAddModalOpen(false)} onAdd={addScale} modalRoot={modalRoot} modalSpelling={modalSpelling} onRootChange={handleModalRootChange} onFlatToggle={handleModalFlatToggle} />

      {confirmClearAll && (
        <div onClick={() => setConfirmClearAll(false)} style={{
          position:"fixed", inset:0, zIndex:200,
          background:TH.overlay, display:"flex", alignItems:"center", justifyContent:"center", padding:"20px",
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background:TH.popupBg, border:`1px solid ${TH.popupBorder}`,
            borderRadius:"14px", padding:"24px", boxShadow:"0 12px 48px rgba(0,0,0,0.7)",
            width:"100%", maxWidth:"320px", textAlign:"center",
          }}>
            <div style={{ fontSize:"15px", fontWeight:700, color:TH.text, marginBottom:"6px" }}>
              すべてクリア
            </div>
            <div style={{ fontSize:"13px", color:TH.dim, marginBottom:"18px" }}>
              {scales.length}件のスケールをすべて削除しますか？
            </div>
            <div style={{ display:"flex", gap:"8px" }}>
              <button onClick={() => setConfirmClearAll(false)} style={{
                flex:"1 1 0", border:`1px solid ${TH.border}`, cursor:"pointer",
                fontFamily:"inherit", outline:"none", fontWeight:600, fontSize:"14px",
                borderRadius:"8px", padding:"10px 0",
                background:"transparent", color:TH.dim, transition:"all 0.12s",
              }}>キャンセル</button>
              <button onClick={() => { clearScales(); setConfirmClearAll(false); }} style={{
                flex:"1 1 0", border:"none", cursor:"pointer",
                fontFamily:"inherit", outline:"none", fontWeight:700, fontSize:"14px",
                borderRadius:"8px", padding:"10px 0",
                background:"#c44", color:"#fff", transition:"all 0.12s",
              }}>すべて削除</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<GuitarScaleViewer />, document.getElementById("root"));
</script>
</body>
</html>
