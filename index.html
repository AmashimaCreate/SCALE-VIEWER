<script>
const {

// ============================================================
// Guitar Scale Viewer v1.6 — 指板タップ音対応
// ============================================================

const NOTES_SHARP = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const NOTES_FLAT = ["C", "D♭", "D", "E♭", "E", "F", "G♭", "G", "A♭", "A", "B♭", "B"];
const TUNING = [4, 9, 2, 7, 11, 4];
const TUNING_NAMES = ["E", "A", "D", "G", "B", "E"];
const GUITAR_OPEN_MIDI = [40, 45, 50, 55, 59, 64];
const NUM_STRINGS = 6;
const DEFAULT_NUM_FRETS = 21;
const FRET_MARKERS = [3, 5, 7, 9, 12, 15, 17, 19, 21];
const DOUBLE_MARKERS = [12];

// ============================================================
// スケール統合定義 (SCALE_DEFS)
// ============================================================
// semitones: 半音配列（内部計算用）
// degreeTokens: 理論綴り用の度数トークン（内部用, ASCII: b/#）
// displayDegrees: UI表示用の度数（♭/♯ Unicode）
// defaultFlat: ♭表記をデフォルトにするか
//
// 変更は全てここで行う。SCALESやSCALE_THEORYへの二重管理は不要。
// ============================================================
const SCALE_DEFS = {
  "Major": {
    semitones: [0, 2, 4, 5, 7, 9, 11],
    degreeTokens: ["1", "2", "3", "4", "5", "6", "7"],
    displayDegrees: ["R", "2", "3", "4", "5", "6", "7"]
  },
  "Natural Minor": {

    degreeTokens: ["1", "2", "b3", "4", "5", "b6", "b7"],
    displayDegrees: ["R", "2", "♭3", "4", "5", "♭6", "♭7"],
    defaultFlat: true
  },
  "Major Pentatonic": {
    semitones: [0, 2, 4, 7, 9],
    degreeTokens: ["1", "2", "3", "5", "6"],
    displayDegrees: ["R", "2", "3", "5", "6"]
  },
  "Minor Pentatonic": {
    semitones: [0, 3, 5, 7, 10],
    degreeTokens: ["1", "b3", "4", "5", "b7"],
    displayDegrees: ["R", "♭3", "4", "5", "♭7"],
    defaultFlat: true
  },
  "Blues": {
    semitones: [0, 3, 5, 6, 7, 10],
    degreeTokens: ["1", "b3", "4", "b5", "5", "b7"],
    displayDegrees: ["R", "♭3", "4", "♭5", "5", "♭7"],
    defaultFlat: true
  },
  "Dorian": {
    semitones: [0, 2, 3, 5, 7, 9, 10],
    degreeTokens: ["1", "2", "b3", "4", "5", "6", "b7"],
    displayDegrees: ["R", "2", "♭3", "4", "5", "6", "♭7"],
    defaultFlat: true
  },
  "Phrygian": {
    semitones: [0, 1, 3, 5, 7, 8, 10],
    degreeTokens: ["1", "b2", "b3", "4", "5", "b6", "b7"],
    displayDegrees: ["R", "♭2", "♭3", "4", "5", "♭6", "♭7"],
    defaultFlat: true
  },
  "Lydian": {
    semitones: [0, 2, 4, 6, 7, 9, 11],
    degreeTokens: ["1", "2", "3", "#4", "5", "6", "7"],
    displayDegrees: ["R", "2", "3", "#4", "5", "6", "7"]
  },
  "Mixolydian": {
    semitones: [0, 2, 4, 5, 7, 9, 10],
    degreeTokens: ["1", "2", "3", "4", "5", "6", "b7"],
    displayDegrees: ["R", "2", "3", "4", "5", "6", "♭7"]
  },
  "Locrian": {
    semitones: [0, 1, 3, 5, 6, 8, 10],
    degreeTokens: ["1", "b2", "b3", "4", "b5", "b6", "b7"],
    displayDegrees: ["R", "♭2", "♭3", "4", "♭5", "♭6", "♭7"],
    defaultFlat: true
  },
  "Melodic Minor": {
    semitones: [0, 2, 3, 5, 7, 9, 11],
    degreeTokens: ["1", "2", "b3", "4", "5", "6", "7"],
    displayDegrees: ["R", "2", "♭3", "4", "5", "6", "7"],
    defaultFlat: true
  },
  "Harmonic Minor": {
    semitones: [0, 2, 3, 5, 7, 8, 11],
    degreeTokens: ["1", "2", "b3", "4", "5", "b6", "7"],
    displayDegrees: ["R", "2", "♭3", "4", "5", "♭6", "7"],
    defaultFlat: true
  },
  "Altered": {
    semitones: [0, 1, 3, 4, 6, 8, 10],
    degreeTokens: ["1", "b9", "#9", "3", "#11", "b13", "b7"],
    displayDegrees: ["R", "♭9", "#9", "3", "#11", "♭13", "♭7"],
    defaultFlat: true
  },
  "Whole Tone": {
    semitones: [0, 2, 4, 6, 8, 10],
    degreeTokens: ["1", "2", "3", "#4", "#5", "b7"],
    displayDegrees: ["R", "2", "3", "#4", "♭6", "♭7"],
    defaultFlat: true
  },
  "Diminished": {
    semitones: [0, 2, 3, 5, 6, 8, 9, 11],
    degreeTokens: ["1", "2", "b3", "4", "b5", "b6", "6", "7"],
    displayDegrees: ["R", "2", "♭3", "4", "♭5", "♭6", "6", "7"],
    defaultFlat: true
  },
  "Lydian ♭7": {
    semitones: [0, 2, 4, 6, 7, 9, 10],
    degreeTokens: ["1", "2", "3", "#4", "5", "6", "b7"],
    displayDegrees: ["R", "2", "3", "#4", "5", "6", "♭7"]
  },
  "HMP5 below": {
    semitones: [0, 1, 4, 5, 7, 8, 10],
    degreeTokens: ["1", "b2", "3", "4", "5", "b6", "b7"],
    displayDegrees: ["R", "♭2", "3", "4", "5", "♭6", "♭7"],
    defaultFlat: true
  },
  "Combination of Diminished": {
    semitones: [0, 1, 3, 4, 6, 7, 9, 10],
    degreeTokens: ["1", "b2", "b3", "3", "b5", "5", "6", "b7"],
    displayDegrees: ["R", "♭2", "♭3", "3", "♭5", "5", "6", "♭7"],
    defaultFlat: true
  },
  "Ionian": {
    semitones: [0, 2, 4, 5, 7, 9, 11],
    degreeTokens: ["1", "2", "3", "4", "5", "6", "7"],
    displayDegrees: ["R", "2", "3", "4", "5", "6", "7"]
  },
  "Aeolian": {
    semitones: [0, 2, 3, 5, 7, 8, 10],
    degreeTokens: ["1", "2", "b3", "4", "5", "b6", "b7"],
    displayDegrees: ["R", "2", "♭3", "4", "5", "♭6", "♭7"],
    defaultFlat: true
  }
};

// ── 互換アクセサ ──
// 既存コード(scalePcs, degreeLabel等)が SCALES[key].iv / .deg を参照するため、
// SCALE_DEFS から自動生成して互換性を維持する
const SCALES = {};
for (const [k, d] of Object.entries(SCALE_DEFS)) {
  SCALES[k] = {
    iv: d.semitones,
    deg: d.displayDegrees
  };
  if (d.defaultFlat) SCALES[k].defaultFlat = true;
}

// SCALE_DEFS アクセサ関数（今後はこちらを使う）
function getScaleDef(scaleKey) {
  return SCALE_DEFS[scaleKey] || null;
}
function getScaleSemitones(scaleKey) {
  return SCALE_DEFS[scaleKey]?.semitones || [];
}
function getScaleDisplayDegrees(scaleKey) {
  return SCALE_DEFS[scaleKey]?.displayDegrees || [];
}
function getScaleDegreeTokens(scaleKey) {
  return SCALE_DEFS[scaleKey]?.degreeTokens || [];
}
function getScaleDefaultFlat(scaleKey) {
  return SCALE_DEFS[scaleKey]?.defaultFlat || false;
}
const VIEW_MODES = ["全体", "3NPS", "BOX", "CAGED"];
// 全体ボタンを押すたびに循環する表示モード
const DISPLAY_CYCLE = ["全体", "R35", "R37", "ルート"];
// R35/R37の表示フィルタ用度数セット
const VIEW_HIGHLIGHT_DEGREES = {
  "R35": ["R", "3", "♭3", "5"],
  "R37": ["R", "3", "♭3", "7", "♭7"]
};
const CAGED_LABELS = ["C", "A", "G", "E", "D"];
const SCALE_CATEGORIES = [{
  label: "Basic",
  scales: ["Major", "Natural Minor", "Major Pentatonic", "Minor Pentatonic", "Blues"]
}, {
  label: "Modes",
  scales: ["Ionian", "Dorian", "Phrygian", "Lydian", "Mixolydian", "Aeolian", "Locrian"]
}, {
  label: "Other",
  scales: ["Melodic Minor", "Harmonic Minor", "HMP5 below", "Altered", "Lydian ♭7", "Whole Tone", "Diminished", "Combination of Diminished"]
}];
const ACCENT_COLORS = ["#e8874a", "#4a90d9", "#6ec87a", "#c975d1", "#d4a843"];

// ── Utility ──
function noteAt(si, fret) {
  return (TUNING[si] + fret) % 12;
}
function midiToFrequency(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}
let fretAudioContext = null;
let activeFretVoices = [];
function getFretAudioContext() {
  const AudioCtor = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtor) return null;
  if (!fretAudioContext) fretAudioContext = new AudioCtor();
  return fretAudioContext;
}
function playFretNote(si, fret) {
  const ctx = getFretAudioContext();
  if (!ctx) return;
  if (ctx.state === "suspended") ctx.resume().catch(() => {});
  const now = ctx.currentTime;
  const midi = GUITAR_OPEN_MIDI[si] + fret;
  const freq = midiToFrequency(midi);
  activeFretVoices = activeFretVoices.filter(stop => typeof stop === "function").slice(-5);
  const osc = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(freq, now);
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(Math.min(4200, freq * 5), now);
  filter.Q.setValueAtTime(0.7, now);
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.18, now + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.75);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(ctx.destination);
  const stop = () => {
    try {
      osc.stop();
    } catch {}
    try {
      osc.disconnect();
      filter.disconnect();
      gain.disconnect();
    } catch {}
  };
  activeFretVoices.push(stop);
  while (activeFretVoices.length > 6) {
    const oldStop = activeFretVoices.shift();
    if (oldStop) oldStop();
  }
  osc.start(now);
  window.setTimeout(stop, 850);
}
function noteName(pc, flat) {
  return (flat ? NOTES_FLAT : NOTES_SHARP)[pc % 12];
}
function interval(rootPc, notePc) {
  return (notePc - rootPc + 12) % 12;
}
function scalePcs(rootPc, scaleKey) {
  const s = SCALES[scaleKey];
  return s ? s.iv.map(iv => (rootPc + iv) % 12) : [];
}
function degreeLabel(rootPc, notePc, scaleKey) {
  const s = SCALES[scaleKey];
  if (!s) return "?";
  const iv = interval(rootPc, notePc);
  const idx = s.iv.indexOf(iv);
  return idx >= 0 ? s.deg[idx] : "?";
}

// ============================================================
// 理論綴りレイヤー（Phase 1）
// ============================================================
// 内部の音高計算(pitchClass)は維持し、表示用の正しい音名綴りを
// rootSpelling + degreeToken から導出する。
//
// 例: buildSpelledScale("F#","Major") → F#,G#,A#,B,C#,D#,E#
//     buildSpelledScale("G♭","Major") → G♭,A♭,B♭,C♭,D♭,E♭,F
// ============================================================

// ダイアトニック7音の文字名とそのnatural pitchClass
const LETTERS = ["C", "D", "E", "F", "G", "A", "B"];
const LETTER_PC = {
  C: 0,
  D: 2,
  E: 4,
  F: 5,
  G: 7,
  A: 9,
  B: 11
};

// 音名文字列を { letter, accidental, pc } に分解
// 例: "D♭" → { letter:"D", accidental:"b", pc:1 }
// 例: "F#" → { letter:"F", accidental:"#", pc:6 }
// 例: "C"  → { letter:"C", accidental:"",  pc:0 }
function parseNoteSpelling(noteStr) {
  if (!noteStr || noteStr.length === 0) return null;
  const letter = noteStr[0].toUpperCase();
  const rest = noteStr.slice(1);
  const basePC = LETTER_PC[letter];
  if (basePC === undefined) return null;
  let accidentalSemitones = 0;
  let accidental = "";
  for (const ch of rest) {
    if (ch === "#" || ch === "♯") {
      accidentalSemitones += 1;
      accidental += "#";
    } else if (ch === "b" || ch === "♭") {
      accidentalSemitones -= 1;
      accidental += "b";
    }
  }
  const pc = ((basePC + accidentalSemitones) % 12 + 12) % 12;
  return {
    letter,
    accidental,
    pc
  };
}

// 文字名のインデックス (C=0, D=1, ..., B=6)
function getLetterIndex(letter) {
  return LETTERS.indexOf(letter.toUpperCase());
}

// degreeToken ("1","2","b3","#4","b7"等) から
// ダイアトニックステップ数 (0-6) を返す
// "1"→0, "2"→1, "b3"→2, "3"→2, "4"→3, "#4"→3, "b5"→4, "5"→4, etc.
// compound: "b9"→1, "#9"→1, "#11"→3, "b13"→5
function degreeTokenToStep(token) {
  // 数字部分を取り出す
  const numMatch = token.match(/\d+/);
  if (!numMatch) return 0;
  let num = parseInt(numMatch[0]);
  // compound interval → simple に変換 (9→2, 11→4, 13→6)
  if (num > 7) num = num - 7;
  // 度数は1始まりなのでstep = num-1
  return (num - 1) % 7;
}

// ルート文字名から指定ステップ数だけ上の文字名を返す
// 例: rootLetter="D", step=2 → "F" (D→E→F)
function letterAtStep(rootLetter, step) {
  const rootIdx = getLetterIndex(rootLetter);
  if (rootIdx < 0) return "C";
  return LETTERS[(rootIdx + step) % 7];
}

// semitone差からaccidental文字列を生成
// offset: 目標pcとその文字のnaturalPCの差 (-2..+2)
// 例: -1→"♭", 0→"", +1→"#", -2→"♭♭", +2→"##"
function buildAccidentalStr(offset) {
  // -6以上は+方向に解釈、+6以上は-方向に解釈
  const norm = (offset + 6) % 12 - 6;
  if (norm === 0) return "";
  if (norm === 1) return "#";
  if (norm === -1) return "♭";
  if (norm === 2) return "##";
  if (norm === -2) return "♭♭";
  // それ以外はフォールバック
  if (norm > 0) return "#".repeat(norm);
  return "♭".repeat(-norm);
}

// ── 主役関数: buildSpelledScale ──
// rootSpelling + scaleKey から理論的に正しい構成音配列を返す
// SCALE_DEFS にdegreeTokensがあるスケールのみ対応、なければnull
function buildSpelledScale(rootSpelling, scaleKey) {
  const def = SCALE_DEFS[scaleKey];
  if (!def || !def.degreeTokens) return null;
  const parsed = parseNoteSpelling(rootSpelling);
  if (!parsed) return null;
  const {
    letter: rootLetter,
    pc: rootPc
  } = parsed;
  return def.semitones.map((semi, i) => {
    const targetPc = (rootPc + semi) % 12;
    const token = def.degreeTokens[i];
    const step = degreeTokenToStep(token);
    const targetLetter = letterAtStep(rootLetter, step);
    const naturalPc = LETTER_PC[targetLetter];
    const offset = (targetPc - naturalPc + 12) % 12;
    const normOffset = offset > 6 ? offset - 12 : offset;
    const acc = buildAccidentalStr(normOffset);
    return {
      pc: targetPc,
      spelledName: targetLetter + acc,
      degreeToken: token,
      displayDegree: def.displayDegrees[i]
    };
  });
}

// pc からスケール文脈に合った理論綴り音名を返す汎用関数
// Fretboard・構成音欄共通で使う
function getSpelledNameForPc(rootSpelling, scaleKey, pc, fallbackFlat) {
  const map = buildSpelledScaleMap(rootSpelling, scaleKey);
  if (map && map[pc] !== undefined) return map[pc];
  return noteName(pc, fallbackFlat);
}

// buildSpelledScale の結果を pc → spelledName のマップに変換
// Fretboard描画で毎音ごとにbuildSpelledScaleを呼ぶ無駄を解消するため、
// useMemo等でこのマップをキャッシュして使う
function buildSpelledScaleMap(rootSpelling, scaleKey) {
  const spelled = buildSpelledScale(rootSpelling, scaleKey);
  if (!spelled) return null;
  const map = {};
  for (const s of spelled) map[s.pc] = s.spelledName;
  return map;
}

// スケール構成音名の配列を取得する統一関数
// 構成音欄で使う。理論綴り対応スケールはbuildSpelledScale、非対応はfallback
function getScaleNoteNames(rootSpelling, scaleKey, rootPc, fallbackFlat) {
  const spelled = buildSpelledScale(rootSpelling, scaleKey);
  if (spelled) return spelled.map(s => s.spelledName);
  // fallback: pitchClassベース
  const pcs = scalePcs(rootPc, scaleKey);
  return pcs.map(pc => noteName(pc, fallbackFlat));
}

// rootPc + useFlat から rootSpelling を推定（既存データ互換・新規追加の初期値用のみ）
// 注意: 既にrootSpellingが確定している場面ではこの関数で上書きしないこと
function inferRootSpelling(rootPc, useFlat) {
  return useFlat ? NOTES_FLAT[rootPc] : NOTES_SHARP[rootPc];
}

// rootSpelling が♭系かどうかを判定（useFlat の従属値として使う）
function isSpellingFlat(spelling) {
  if (!spelling) return false;
  return spelling.includes("♭") || spelling.includes("b");
}

// ============================================================
// スケールstate正規化（共通関数）
// ============================================================
// addScale / loadPreset / initScales / handleXxx で
// root / rootSpelling / useFlat / scaleName の整合を統一する
//
// 方針:
// - rootSpelling が既にあれば正とし、上書きしない
// - rootSpelling が無い場合のみ inferRootSpelling で補完
// - useFlat は rootSpelling から導出（従属値）
// - defaultFlat は useFlat の初期提案にのみ使用
function normalizeScaleEntry(entry) {
  const root = entry.root ?? 0;
  const scaleName = entry.scaleName ?? "Major";
  // rootSpelling: あればそのまま。無ければ推定補完
  const rootSpelling = entry.rootSpelling || inferRootSpelling(root, entry.useFlat ?? false);
  // useFlat: rootSpellingから導出（rootSpellingが主）
  const useFlat = isSpellingFlat(rootSpelling);
  return {
    ...entry,
    root,
    scaleName,
    rootSpelling,
    useFlat
  };
}

function encodeBase64Url(text) {
  const bytes = new TextEncoder().encode(text);
  let binary = "";
  bytes.forEach(b => {
    binary += String.fromCharCode(b);
  });
  return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
}
function decodeBase64Url(text) {
  const padded = text.replace(/-/g, "+").replace(/_/g, "/") + "===".slice((text.length + 3) % 4);
  const binary = atob(padded);
  const bytes = Uint8Array.from(binary, ch => ch.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}
function serializeScaleForShare(scale) {
  return {
    root: scale.root,
    scaleName: scale.scaleName,
    rootSpelling: scale.rootSpelling || inferRootSpelling(scale.root, scale.useFlat),
    useFlat: scale.useFlat,
    viewMode: scale.viewMode,
    showMode: scale.showMode,
    selectedPos: scale.selectedPos,
    showNeighbor: scale.showNeighbor
  };
}
function loadScalesFromUrl() {
  try {
    const encoded = new URLSearchParams(window.location.search).get("s");
    if (!encoded) return null;
    const payload = JSON.parse(decodeBase64Url(encoded));
    const rawScales = Array.isArray(payload) ? payload : payload.scales;
    if (!Array.isArray(rawScales) || rawScales.length === 0) return null;
    return rawScales.slice(0, 8).map((s, i) => ({
      viewMode: "全体",
      showMode: "音名",
      selectedPos: 0,
      ...normalizeScaleEntry(s),
      id: Date.now() + i + Math.random().toString(36).slice(2, 6),
      accentColor: ACCENT_COLORS[i % ACCENT_COLORS.length]
    }));
  } catch {
    return null;
  }
}
function buildShareUrl(scales) {
  const url = new URL(window.location.href);
  const payload = {
    version: 1,
    scales: scales.map(serializeScaleForShare)
  };
  url.searchParams.set("s", encodeBase64Url(JSON.stringify(payload)));
  url.searchParams.delete("v");
  return url.toString();
}
async function copyText(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text);
    return true;
  }
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.setAttribute("readonly", "");
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.select();
  const ok = document.execCommand("copy");
  document.body.removeChild(ta);
  return ok;
}

// ============================================================
// BOX テンプレート（独立管理）
// ============================================================
// BOX は 3NPS の考え方を参考にしたポジション体系だが、
// 現実装では BOX_TEMPLATES として独立にテンプレートを管理している。
// 3NPS から自動生成はしていない。
//
// BOX の特徴（3NPS との違い）:

// ── BOX Generator（独立テンプレート移調型） ──
// BOX_TEMPLATES から直接テンプレートを取得し移調する。
// transposeShape() は 3NPS / CAGED と共用。
// posRotate でモード対応（3NPSと同じ回転ルール）。
function generateBOX(rootPc, scaleKey, numFrets = DEFAULT_NUM_FRETS) {
  const {
    template: tplKey,
    baseRootOverride,
    posRotate
  } = resolveScale(scaleKey);
  const template = BOX_TEMPLATES[tplKey];
  if (!template) return [];
  const baseRoot = baseRootOverride ?? template.baseRoot;
  const shift = (rootPc - baseRoot + 12) % 12;
  const positions = template.positions;
  const len = positions.length;

  // posRotateが必要な場合（モード対応）
  const rotated = [];
  for (let i = 0; i < len; i++) {
    rotated.push(positions[(i + posRotate) % len]);
  }
  return rotated.map((pos, i) => ({
    ...transposeShape(pos, shift, numFrets),
    label: `Pos ${i + 1}`
  }));
}

// ── スケール名エイリアス & モード解決 ──
// posRotate: 3NPSのポジション配列を何個回転させるか
// shapeRotate: CAGEDのshape配列を何個回転させラベルを振り直すか
//   ルート位置が変わるとshape名(C,A,G,E,D)の対応がずれるため
const CAGED_LABEL_ORDER = ["C", "A", "G", "E", "D"];

function resolveScale(scaleKey) {
  const entry = SCALE_RESOLVE_MAP[scaleKey];
  if (entry) return entry;
  return {
    template: scaleKey,
    baseRootOverride: null,
    posRotate: 0,
    shapeRotate: 0
  };
}

// ── 3NPS Generator（テンプレート移調型） ──
// transposeShape() はCAGEDと共用
// posRotate でモードに合わせてポジション順を回転し、ラベルを振り直す
function generate3NPS(rootPc, scaleKey, numFrets = DEFAULT_NUM_FRETS) {
  const {
    template: tplKey,
    baseRootOverride,
    posRotate
  } = resolveScale(scaleKey);
  const template = NPS_TEMPLATES[tplKey];
  if (!template) return [];
  const baseRoot = baseRootOverride ?? template.baseRoot;
  const shift = (rootPc - baseRoot + 12) % 12;
  const positions = template.positions;
  const len = positions.length;

  // posRotate分だけ配列を回転（Pos2始まり→Pos2,3,4,5,6,7,1の順）
  const rotated = [];
  for (let i = 0; i < len; i++) {
    rotated.push(positions[(i + posRotate) % len]);
  }

  // 移調してラベルを振り直す
  return rotated.map((pos, i) => ({
    ...transposeShape(pos, shift, numFrets),
    label: `Pos ${i + 1}`
  }));
}

// ── shape1個を移調する関数 ──
// shape: { label, frets:{0:[...], ...5:[...]}, lo, hi }
// shift: フレット方向のずらし量（正=高フレット方向）
// numFrets: 指板の最大フレット数
//
// ルール:
//   - 各フレットは f + shift のみ（±12の個別追加はしない）
//   - shape内の相対構造は絶対に壊さない
//   - shift候補を3つ（baseShift / baseShift-12 / baseShift+12）比較し、
//     0〜numFrets に最も自然に収まるものを選ぶ
//   - 低ポジション寄りを優先する
function transposeShape(shape, shift, numFrets) {
  // 候補shiftを3つ用意し、最も自然な位置のものを選ぶ
  const candidates = [shift, shift - 12, shift + 12];
  let bestShift = shift;
  let bestScore = -Infinity;
  for (const s of candidates) {
    const lo = shape.lo + s;
    const hi = shape.hi + s;
    // 全体が範囲内に収まるか
    if (lo < 0 || hi > numFrets) continue;
    // スコア: 指板の中央付近を好み、極端に高い/低いを避ける
    // center = shapeの中心位置、指板中央(numFrets/2)との距離が小さいほど高スコア
    // 同点なら低い方を優先（- lo * 0.1 で微調整）
    const center = (lo + hi) / 2;
    const distFromMid = Math.abs(center - numFrets / 2);
    const score = numFrets - distFromMid - lo * 0.1;
    if (score > bestScore) {
      bestScore = score;
      bestShift = s;
    }
  }

  // どの候補も完全に収まらなかった場合、元のshiftで部分的に表示
  if (bestScore === -Infinity) bestShift = shift;
  const newFrets = {};
  let newLo = numFrets,
    newHi = 0;
  for (let si = 0; si < NUM_STRINGS; si++) {
    const original = shape.frets[si] || [];
    const shifted = original.map(f => f + bestShift).filter(f => f >= 0 && f <= numFrets);
    newFrets[si] = shifted;
    for (const f of shifted) {
      if (f < newLo) newLo = f;
      if (f > newHi) newHi = f;
    }
  }
  if (newLo > newHi) {
    newLo = 0;
    newHi = 0;
  }
  return {
    label: shape.label,
    frets: newFrets,
    lo: newLo,
    hi: newHi
  };
}

// ── CAGED Generator（テンプレート移調型） ──
// CAGED は shape名(C,A,G,E,D) の正確性が重要なため、
// 厳密に検証済みのスケールのみ表示する。
// モード系(Ionian/Dorian等)やMelodic Minor派生はCAGED非対応とし、
// 誤ったフォーム名を出すリスクを回避する。
const CAGED_ALLOWED_SCALES = ["Major", "Natural Minor", "Minor Pentatonic", "Major Pentatonic", "Blues"];
function generateCAGED(rootPc, scaleKey, numFrets = DEFAULT_NUM_FRETS) {
  // CAGED対応スケールのみ許可、それ以外は空配列（ボタン非表示になる）
  if (!CAGED_ALLOWED_SCALES.includes(scaleKey)) return [];
  const {
    template: tplKey,
    baseRootOverride,
    shapeRotate
  } = resolveScale(scaleKey);
  const template = CAGED_TEMPLATES[tplKey];
  if (!template) return [];
  const baseRoot = baseRootOverride ?? template.baseRoot;
  const shift = (rootPc - baseRoot + 12) % 12;
  const shapes = template.shapes;
  const len = shapes.length;
  return shapes.map((shape, i) => {
    const transposed = transposeShape(shape, shift, numFrets);
    const labelIdx = (i + shapeRotate) % len;
    const newLabel = CAGED_LABEL_ORDER[labelIdx] ?? shape.label;
    return {
      ...transposed,
      label: newLabel
    };
  });
}
function getPositionsForMode(viewMode, p3, pC, pB) {
  if (viewMode === "3NPS") return p3;
  if (viewMode === "BOX") return pB;
  if (viewMode === "CAGED") return pC;
  return [];
}

// ── Self Tests ──
// shape の構造妥当性を検証するヘルパー
function validateShape(shape, label) {
  const errors = [];
  if (!shape) {
    errors.push(`${label}: shape is null`);
    return errors;
  }
  for (let si = 0; si < NUM_STRINGS; si++) {
    if (!Array.isArray(shape.frets[si])) errors.push(`${label}: frets[${si}] is not array`);
  }
  if (typeof shape.lo !== "number" || typeof shape.hi !== "number") errors.push(`${label}: lo/hi not number`);
  if (shape.lo > shape.hi) errors.push(`${label}: lo(${shape.lo}) > hi(${shape.hi})`);
  return errors;
}

// shape内の全音がスケールに属しているか＋rootが含まれているかを検証
function validateShapeNotes(shape, rootPc, scaleKey, label) {
  const errors = [];
  if (!shape) return errors;
  const pcs = scalePcs(rootPc, scaleKey);
  if (pcs.length === 0) return errors;
  let hasRoot = false;
  for (let si = 0; si < NUM_STRINGS; si++) {
    const arr = shape.frets[si] || [];
    for (const f of arr) {
      const pc = noteAt(si, f);
      if (!pcs.includes(pc)) errors.push(`${label}: str${si} f${f} pc=${pc} not in scale`);
      if (pc === rootPc) hasRoot = true;
    }
  }
  if (!hasRoot) errors.push(`${label}: root(${rootPc}) not found in shape`);
  return errors;
}
function runSelfTests() {
  const e = [];
  // 基本音名テスト
  if (noteAt(0, 0) !== 4) e.push("6弦 open ≠ E");
  if (noteAt(0, 5) !== 9) e.push("6弦 F5 ≠ A");
  if (noteAt(1, 0) !== 9) e.push("5弦 open ≠ A");
  if (noteAt(1, 3) !== 0) e.push("5弦 F3 ≠ C");
  if (noteAt(5, 0) !== 4) e.push("1弦 open ≠ E");
  if (interval(0, 7) !== 7) e.push("C→G ≠ 7");
  if (interval(9, 0) !== 3) e.push("A→C ≠ 3");
  if (JSON.stringify(scalePcs(0, "Major")) !== JSON.stringify([0, 2, 4, 5, 7, 9, 11])) e.push("C Major pcs");
  if (degreeLabel(0, 4, "Major") !== "3") e.push("C Major deg E ≠ 3");
  if (degreeLabel(9, 0, "Natural Minor") !== "♭3") e.push("Am deg C ≠ ♭3");

  // 構造 + 理論検証を共通で行うヘルパー
  const testGenerated = (shapes, rootPc, scaleKey, system) => {
    shapes.forEach((s, i) => {
      const lbl = `${system} ${scaleKey} ${s.label ?? i}`;
      e.push(...validateShape(s, lbl));
      e.push(...validateShapeNotes(s, rootPc, scaleKey, lbl));
    });
  };

  // C Major: 3NPS / CAGED / BOX
  const p3 = generate3NPS(0, "Major");
  if (p3.length === 0) e.push("3NPS C Major empty");
  testGenerated(p3, 0, "Major", "3NPS");
  const pC = generateCAGED(0, "Major");
  if (pC.length !== 5) e.push("CAGED C Major count ≠ 5");
  testGenerated(pC, 0, "Major", "CAGED");
  const pB = generateBOX(0, "Major");
  if (pB.length === 0) e.push("BOX C Major empty");
  testGenerated(pB, 0, "Major", "BOX");

  // A Natural Minor: 3NPS / CAGED / BOX
  const p3m = generate3NPS(9, "Natural Minor");
  if (p3m.length === 0) e.push("3NPS A NatMin empty");
  testGenerated(p3m, 9, "Natural Minor", "3NPS");
  const pCm = generateCAGED(9, "Natural Minor");
  if (pCm.length !== 5) e.push("CAGED A NatMin count ≠ 5");
  testGenerated(pCm, 9, "Natural Minor", "CAGED");
  const pBm = generateBOX(9, "Natural Minor");
  if (pBm.length === 0) e.push("BOX A NatMin empty");
  testGenerated(pBm, 9, "Natural Minor", "BOX");

  // 移調テスト: D Major
  const p3d = generate3NPS(2, "Major");
  if (p3d.length === 0) e.push("3NPS D Major empty");
  testGenerated(p3d, 2, "Major", "3NPS");
  const pCd = generateCAGED(2, "Major");
  if (pCd.length !== 5) e.push("CAGED D Major count ≠ 5");
  testGenerated(pCd, 2, "Major", "CAGED");

  // ── 理論綴りレイヤーテスト ──
  const spellTest = (rootSpelling, scaleKey, expected, label) => {
    const result = buildSpelledScale(rootSpelling, scaleKey);
    if (!result) {
      e.push(`${label}: buildSpelledScale returned null`);
      return;
    }
    const names = result.map(s => s.spelledName).join(",");
    if (names !== expected) e.push(`${label}: got ${names}, expected ${expected}`);
  };
  // Major
  spellTest("C", "Major", "C,D,E,F,G,A,B", "Spell C Major");
  spellTest("F#", "Major", "F#,G#,A#,B,C#,D#,E#", "Spell F# Major");
  spellTest("G♭", "Major", "G♭,A♭,B♭,C♭,D♭,E♭,F", "Spell G♭ Major");
  spellTest("D", "Major", "D,E,F#,G,A,B,C#", "Spell D Major");
  spellTest("B♭", "Major", "B♭,C,D,E♭,F,G,A", "Spell B♭ Major");
  spellTest("E♭", "Major", "E♭,F,G,A♭,B♭,C,D", "Spell E♭ Major");
  spellTest("A♭", "Major", "A♭,B♭,C,D♭,E♭,F,G", "Spell A♭ Major");
  // Natural Minor
  spellTest("A", "Natural Minor", "A,B,C,D,E,F,G", "Spell A NatMin");
  spellTest("E♭", "Natural Minor", "E♭,F,G♭,A♭,B♭,C♭,D♭", "Spell E♭ NatMin");
  spellTest("F#", "Natural Minor", "F#,G#,A,B,C#,D,E", "Spell F# NatMin");
  spellTest("C", "Natural Minor", "C,D,E♭,F,G,A♭,B♭", "Spell C NatMin");
  // 追加テスト: モードとその他スケール
  spellTest("D", "Dorian", "D,E,F,G,A,B,C", "Spell D Dorian");
  spellTest("E", "Phrygian", "E,F,G,A,B,C,D", "Spell E Phrygian");
  spellTest("A", "Minor Pentatonic", "A,C,D,E,G", "Spell A MinPenta");
  spellTest("A", "Blues", "A,C,D,E♭,E,G", "Spell A Blues");
  spellTest("C", "Melodic Minor", "C,D,E♭,F,G,A,B", "Spell C MelMin");
  spellTest("C", "Harmonic Minor", "C,D,E♭,F,G,A♭,B", "Spell C HarMin");
  // Altered: compound interval (b9,#9,#11,b13) の綴り検証
  spellTest("C", "Altered", "C,D♭,D#,E,F#,A♭,B♭", "Spell C Altered");
  // Diminished: 8音で同文字名の重複がないか
  spellTest("C", "Diminished", "C,D,E♭,F,G♭,A♭,A,B", "Spell C Dimi");
  spellTest("C", "Combination of Diminished", "C,D♭,E♭,E,G♭,G,A,B♭", "Spell C ComDimi");
  // Whole Tone
  spellTest("C", "Whole Tone", "C,D,E,F#,G#,B♭", "Spell C WholeTone");
  // Lydian b7
  spellTest("C", "Lydian ♭7", "C,D,E,F#,G,A,B♭", "Spell C Lyd♭7");
  // HMP5 below
  spellTest("C", "HMP5 below", "C,D♭,E,F,G,A♭,B♭", "Spell C HMP5b");
  // Blues ♭5確認: F Blues
  spellTest("F", "Blues", "F,A♭,B♭,C♭,C,E♭", "Spell F Blues");

  // ── rootSpelling 補完テスト ──
  if (inferRootSpelling(1, true) !== "D♭") e.push("inferRootSpelling(1,true) ≠ D♭");
  if (inferRootSpelling(1, false) !== "C#") e.push("inferRootSpelling(1,false) ≠ C#");
  if (inferRootSpelling(6, true) !== "G♭") e.push("inferRootSpelling(6,true) ≠ G♭");
  if (inferRootSpelling(6, false) !== "F#") e.push("inferRootSpelling(6,false) ≠ F#");

  // ── getSpelledNameForPc テスト ──
  // F# Major の pc=5 は E#（noteName だと F になるが理論綴りでは E#）
  if (getSpelledNameForPc("F#", "Major", 5, false) !== "E#") e.push("getSpelledNameForPc F# Maj pc5 ≠ E#");
  // G♭ Major の pc=11 は C♭
  if (getSpelledNameForPc("G♭", "Major", 11, true) !== "C♭") e.push("getSpelledNameForPc G♭ Maj pc11 ≠ C♭");
  // fallback: 未知スケールでは noteName に落ちる
  if (getSpelledNameForPc("C", "UnknownScale", 0, false) !== "C") e.push("getSpelledNameForPc fallback ≠ C");

  // ── SCALE_DEFS 統合テスト: SCALESとの整合確認 ──
  const majS = SCALES["Major"];
  const majD = SCALE_DEFS["Major"];
  if (JSON.stringify(majS.iv) !== JSON.stringify(majD.semitones)) e.push("SCALES/SCALE_DEFS Major iv mismatch");
  if (JSON.stringify(majS.deg) !== JSON.stringify(majD.displayDegrees)) e.push("SCALES/SCALE_DEFS Major deg mismatch");
  return e;
}

// ── Storage ──
// version を持たせて将来の互換性を確保
const STORAGE_KEY = "guitar-scale-viewer";
const STORAGE_VERSION = 2; // v1.4対応

function loadState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!raw) return null;
    // version未対応の古いデータでも scales があれば使う
    if (raw.version === STORAGE_VERSION) return raw;
    // 旧形式: version無しでもscalesがあればマイグレーション
    if (raw.scales && Array.isArray(raw.scales)) return {
      ...raw,
      version: STORAGE_VERSION
    };
    return null;
  } catch {
    return null;
  }
}

// 旧キーからのマイグレーション（初回のみ）
(function migrateOldStorage() {
  try {
    const oldKey = "guitar-scale-viewer-v1";
    const oldData = localStorage.getItem(oldKey);
    if (oldData && !localStorage.getItem(STORAGE_KEY)) {
      const parsed = JSON.parse(oldData);
      if (parsed?.scales) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          ...parsed,
          version: STORAGE_VERSION
        }));
      }
      localStorage.removeItem(oldKey);
    }
  } catch {}
})();
function saveState(s) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      ...s,
      version: STORAGE_VERSION
    }));
  } catch {}
}
